name: Build & Release

on:
  push:
    tags:
      - 'v*'          # matches v1.0.0, v2.1.0-beta.1, etc.
  workflow_dispatch:  # allows manual trigger from the Actions tab
    inputs:
      tag:
        description: 'Version tag to build (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the tag ref is available

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true   # ensures 3.14 is accepted even before final release
          cache: 'pip'

      # ── Derive version strings ───────────────────────────────────
      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          # Use the pushed tag, or fall back to the manual-dispatch input
          $tag = if ("${{ github.ref_name }}" -ne "") {
            "${{ github.ref_name }}"
          } else {
            "${{ github.event.inputs.tag }}"
          }
          $ver = $tag -replace '^v', ''
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "ver=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "tag=$tag  ver=$ver"

      # ── Stamp version into source before building ─────────────────
      - name: Patch version.py
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.ver }}"
          (Get-Content version.py) `
            -replace '__version__ = ".*"', "__version__ = `"$ver`"" |
            Set-Content version.py
          Get-Content version.py

      # ── Dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Build ─────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm

      # ── Package ───────────────────────────────────────────────────
      - name: Rename executable
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          Rename-Item dist\GitSwitcher.exe "GitSwitcher-$tag.exe"
          Write-Host "Artifact: dist\GitSwitcher-$tag.exe"

      # ── Release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Git Profile Switcher ${{ steps.ver.outputs.tag }}"
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/GitSwitcher-${{ steps.ver.outputs.tag }}.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
